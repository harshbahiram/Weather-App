<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" id="city" placeholder="Enter City Name" spellcheck="false">
            <button onclick="getWeather()"><img src="assets/search.png"></button>
        </div>
        <div class="weather">
            <img src="assets/rain.png" class="weather-icon">
            <h1 class="temp">22°C</h1>
            <h1 class="city">Pune</h1>
        </div>
        <div class="details">
            <div class="col">
                <img src="assets/humidity.png">
                <div>
                    <p class="humidity">50%</p>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="col">
                <img src="assets/wind.png">
                <div>
                    <p class="wind">515 km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        async function getWeather() {
            
            const city = document.getElementById("city").value;
            const weatherIcon = document.querySelector(".weather-icon");

            if (!city) {
                alert("Please enter a city name");
                return;
            }
            try {
                const res = await fetch(`/weather?city=${city}`);

                if(!res.ok) {
                    alert("Server error");
                    return;
                }

                const data = await res.json();

                if (data.cod !== 200) {
                    alert("City not found");
                    return
                }

                document.querySelector(".temp").innerText = Math.round(data.main.temp) + "°C";
                document.querySelector(".city").innerText = data.name;
                document.querySelector(".humidity").innerText = data.main.humidity + "%";
                document.querySelector(".wind").innerText = (data.wind.speed*3.6).toFixed(1) + " km/h";

                const weatherMain = data.weather[0].main;

                if (weatherMain === "Clouds") {weatherIcon.src = "assets/clouds.png";}
                else if (weatherMain === "Clear") {weatherIcon.src = "assets/clear.png";}
                else if (weatherMain === "Rain") {weatherIcon.src = "assets/rain.png";}
                else if (weatherMain === "Drizzle") {weatherIcon.src = "assets/drizzle.png";}
                else if (weatherMain === "Mist") {weatherIcon.src = "assets/mist.png";}
                else if (weatherMain === "Snow") {weatherIcon.src = "assets/snow.png";}
            } catch (error) {
                alert("Error");
            }
        }
    </script>
</body>
</html>
