<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" id="city" placeholder="Enter City Name" spellcheck="false">
            <button onclick="getWeather()"><img src="assets/search.png"></button>
        </div>
        <div class="weather">
            <img src="assets/rain.png" class="weather-icon">
            <h1 class="temp">--°C</h1>
            <h1 class="city">--</h1>
        </div>
        <div class="details">
            <div class="col">
                <img src="assets/humidity.png">
                <div>
                    <p class="humidity">--%</p>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="col">
                <img src="assets/wind.png">
                <div>
                    <p class="wind">-- km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        async function getWeather() {
            const cityInput = document.getElementById("city");
            const city = cityInput.value.trim();

            const weatherSection = document.querySelector(".weather");
            const weatherIcon = document.querySelector(".weather-icon");
            const card = document.querySelector(".card");
            const button = document.querySelector(".search button");

            const tempEl = document.querySelector(".temp");
            const cityEl = document.querySelector(".city");
            const humidityEl = document.querySelector(".humidity");
            const windEl = document.querySelector(".wind");

            if (!city) {
                alert("Please enter a city name");
                return;
            }

            button.disabled = true;

            weatherSection.style.display = "block";
            tempEl.innerText = "⏳ Loading...";
            cityEl.innerText = "";
            humidityEl.innerText = "--%";
            windEl.innerText = "-- km/h";

            try {
                const res = await fetch(`/weather?city=${encodeURIComponent(city)}`);

                if (!res.ok) {
                    throw new Error("Server error");
                }

                const data = await res.json();

                if (data.cod != 200) {
                    cityEl.innerText = "City not found";
                    tempEl.innerText = "--";
                    return;
                }

                const temp = data?.main?.temp;
                const humidity = data?.main?.humidity;
                const windRaw = data?.wind?.speed;
                const weatherMain = data?.weather?.[0]?.main;

                const windSpeed = windRaw ? (windRaw * 3.6).toFixed(1) : "--";

                tempEl.innerText = temp ? Math.round(temp) + "°C" : "--";
                cityEl.innerText = data.name || "Unknown";
                humidityEl.innerText = (humidity ?? "--") + "%";
                windEl.innerText = windSpeed + " km/h";

                const icons = {
                    Clear: "assets/clear.png",
                    Clouds: "assets/clouds.png",
                    Rain: "assets/rain.png",
                    Drizzle: "assets/drizzle.png",
                    Mist: "assets/mist.png",
                    Snow: "assets/snow.png",
                    Haze: "assets/mist.png",
                    Smoke: "assets/mist.png",
                    Dust: "assets/mist.png",
                    Thunderstorm: "assets/rain.png"
                };

                weatherIcon.src = icons[weatherMain] || "assets/clouds.png";

                const themes = {
                    Clear: "linear-gradient(135deg, #56ccf2, #2f80ed)",
                    Clouds: "linear-gradient(135deg, #bdc3c7, #2c3e50)",
                    Rain: "linear-gradient(135deg, #4b6cb7, #182848)",
                    Drizzle: "linear-gradient(135deg, #89f7fe, #66a6ff)",
                    Mist: "linear-gradient(135deg, #757f9a, #d7dde8)",
                    Snow: "linear-gradient(135deg, #e6dada, #274046)",
                    Haze: "linear-gradient(135deg, #757f9a, #d7dde8)",
                    Thunderstorm: "linear-gradient(135deg, #373B44, #4286f4)"
                };

                card.style.background = themes[weatherMain] || themes["Clear"];

            } catch (error) {
                console.error(error);

                cityEl.innerText = "Error loading data";
                tempEl.innerText = "--";
                humidityEl.innerText = "--%";
                windEl.innerText = "-- km/h";
            } finally {
                button.disabled = false;
            }
        }

        document.getElementById("city").addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                getWeather();
            }
        });
</script>
</body>
</html>
