<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" id="city" placeholder="Enter City Name" spellcheck="false">
            <button onclick="getWeather()"><img src="assests/search.png"></button>
        </div>
        <div class="weather">
            <img src="assests/rain.png" class="weather-icon">
            <h1 class="temp">22°C</h1>
            <h1 class="city">Pune</h1>
        </div>
        <div class="details">
            <div class="col">
                <img src="assests/humidity.png">
                <div>
                    <p class="humidity">50%</p>
                    <p>Humidity</p>
                </div>
            </div>
            <div class="col">
                <img src="assests/wind.png">
                <div>
                    <p class="wind">515 km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        async function getWeather() {
            const city = document.getElementById("city").value;
            const weatherIcon = document.querySelector(".weather-icon");

            const res = await fetch(`/weather?city=${city}`);
            const data = await res.json();

            document.querySelector(".temp").innerText = Math.round(data.main.temp) + "°C";
            document.querySelector(".city").innerText = data.name;
            document.querySelector(".humidity").innerText = data.main.humidity + "%";
            document.querySelector(".wind").innerText = data.wind.speed + " km/h";

            if (data.weather[0].main == "Clouds") {
                weatherIcon.src = "assests/clouds.png";
            }
            else if (data.weather[0].main == "Clear") {
                weatherIcon.src = "assests/clear.png";
            }
            else if (data.weather[0].main == "Rain") {
                weatherIcon.src = "assests/rain.png";
            }
            else if (data.weather[0].main == "Drizzle") {
                weatherIcon.src = "assests/drizzle.png";
            }
            else if (data.weather[0].main == "Mist") {
                weatherIcon.src = "assests/mist.png";
            }
        }
    </script>
</body>
</html>
